name: Deploy EuroCrops Viewer to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'eurocrops-viewer/**'
      - '.github/workflows/deploy-eurocrops.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: eurocrops-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: eurocrops-viewer/package-lock.json

      - name: Install dependencies
        working-directory: eurocrops-viewer
        run: npm install

      - name: Build
        working-directory: eurocrops-viewer
        env:
          NODE_ENV: production
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: eurocrops-viewer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
