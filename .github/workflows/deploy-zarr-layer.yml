name: Deploy zarr-layer app to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'ndvi-zarr-layer-app/**'
      - '.github/workflows/deploy-zarr-layer.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ndvi-zarr-layer-app/package-lock.json

      - name: Install dependencies
        working-directory: ndvi-zarr-layer-app
        run: npm ci

      - name: Build
        working-directory: ndvi-zarr-layer-app
        env:
          NODE_ENV: production
          VITE_STAC_URL: https://9cbdcb4884f86a6779032ae561e474a5.r2.cloudflarestorage.com/osc-pub/ndvi_cdr_pyramid_stac_item.json
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ndvi-zarr-layer-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
